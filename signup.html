<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - StayEase Pro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container navbar">
      <a href="index.html" class="brand-logo"><span>Stay</span>Ease Pro</a>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-ghost">Sign In</a>
      </div>
    </div>
  </header>

  <div class="split-layout">
    <!-- Image Side -->
    <div class="split-image" style="background-image: url('https://images.unsplash.com/photo-1578683010236-d716f9a3f461?q=80&w=1000&auto=format&fit=crop');">
      <div class="hero-overlay"></div>
      <div class="hero-content text-left" style="position:absolute; bottom: 10%; padding: var(--space-xl);">
        <h2 class="text-inverse mb-sm">Join the Exclusive</h2>
        <p class="text-inverse" style="opacity: 0.8; max-width: 400px;">Experience a new standard of hospitality where everything you need is right on your device.</p>
      </div>
    </div>
    
    <!-- Form Side -->
    <div class="split-content">
      <div class="auth-form-container">
        <h2 class="mb-xl text-center">Create Account</h2>
        
        <form id="signupForm">
          <div class="form-group">
            <label class="form-label" for="signupName">Full Name</label>
            <input type="text" id="signupName" class="form-control" placeholder="John Doe" required>
            <small class="text-error" id="signupNameErr" style="display:none;"></small>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupEmail">Email Address</label>
            <input type="email" id="signupEmail" class="form-control" placeholder="name@example.com" required>
            <small class="text-error" id="signupEmailErr" style="display:none;"></small>
          </div>
          <div class="form-group">
            <label class="form-label" for="signupPhone">Phone Number</label>
            <input type="tel" id="signupPhone" class="form-control" placeholder="1234567890" required>
            <small class="text-error" id="signupPhoneErr" style="display:none;"></small>
          </div>
          <div class="form-group mb-xl">
            <label class="form-label" for="signupPass">Password</label>
            <input type="password" id="signupPass" class="form-control" placeholder="Min 8 chars, 1 uppercase, 1 number" required>
            <small class="text-error" id="signupPassErr" style="display:none;"></small>
          </div>
          
          <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
          
          <div class="text-center mt-lg">
            <p class="text-muted font-size-sm">Already have an account? <a href="login.html" class="font-weight-600">Sign In</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
