<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - StayEase Pro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container navbar">
      <a href="index.html" class="brand-logo"><span>Stay</span>Ease Pro</a>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-ghost">Sign In</a>
      </div>
    </div>
  </header>

  <div class="split-layout">
    <!-- Image Side -->
    <div class="split-image" style="background-image: url('https://images.unsplash.com/photo-1578683010236-d716f9a3f461?q=80&w=1000&auto=format&fit=crop');">
      <div class="hero-overlay"></div>
      <div class="hero-content text-left" style="position:absolute; bottom: 10%; padding: var(--space-xl);">
        <h2 class="text-inverse mb-sm">Join the Exclusive</h2>
        <p class="text-inverse" style="opacity: 0.8; max-width: 400px;">Experience a new standard of hospitality where everything you need is right on your device.</p>
      </div>
    </div>
    
    <!-- Form Side -->
    <div class="split-content">
      <div class="auth-form-container">
        <div style="margin-bottom: var(--space-xl);">
          <h2 class="mb-sm text-center">Join StayEase Pro</h2>
          <p class="text-muted text-center" style="font-size: 0.95rem;">Create an account to unlock exclusive luxury stays</p>
        </div>
        
        <form id="signupForm">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="fullname" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" id="phone" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="newPassword" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Government ID Type</label>
            <select id="idType" class="form-control">
              <option value="Aadhaar">Aadhaar</option>
              <option value="PAN">PAN</option>
              <option value="Passport">Passport</option>
              <option value="Driving License">Driving License</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Government ID Number</label>
            <input type="text" id="idNumber" class="form-control" required>
          </div>
          <div class="form-group">
            <label style="display:flex; gap:10px; align-items:flex-start;">
              <input type="checkbox" id="terms">
              <span>I agree to the Terms & Conditions</span>
            </label>
          </div>
          <button type="submit"
              class="btn btn-primary btn-block"
              style="padding:1rem;font-weight:600;">
              Create Account
          </button>

        </form>
      </div>
    </div>
  </div>

  <script src="js/notifications.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
