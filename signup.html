<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - StayEase Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-visual">
      <h2>Join StayEase Pro</h2>
      <p class="mt-md">Create an account for faster bookings, exclusive rates, and full digital hotel experience.</p>
    </div>
    <div class="auth-form-container">
      <div class="card auth-form-card">
        <a href="index.html" class="brand-logo mb-xl justify-content-center"><span>Stay</span>Ease Pro</a>
        <h3 class="mb-sm text-center">Create an Account</h3>
        <p class="text-muted text-center mb-lg">Please fill in your details to sign up.</p>
        <form id="signupForm">
          <div class="form-group">
            <label class="form-label" for="fullname">Full Name</label>
            <input type="text" id="fullname" class="form-control" placeholder="Aarav Sharma">
          </div>
          <div class="d-flex gap-md" style="flex-wrap: wrap;">
            <div class="form-group" style="flex: 1; min-width: 150px;">
              <label class="form-label" for="email">Email</label>
              <input type="email" id="email" class="form-control" placeholder="guest@example.com">
            </div>
            <div class="form-group" style="flex: 1; min-width: 150px;">
              <label class="form-label" for="phone">Phone Number</label>
              <input type="tel" id="phone" class="form-control" placeholder="9876543210">
            </div>
          </div>
          <div class="d-flex gap-md" style="flex-wrap: wrap;">
            <div class="form-group" style="flex: 1; min-width: 150px;">
              <label class="form-label" for="idType">Govt ID Type</label>
              <select id="idType" class="form-control">
                <option>Aadhaar Card</option><option>Passport</option><option>Driving License</option><option>Voter ID</option>
              </select>
            </div>
            <div class="form-group" style="flex: 1; min-width: 150px;">
              <label class="form-label" for="idNumber">ID Number</label>
              <input type="text" id="idNumber" class="form-control" placeholder="Required for booking">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="newPassword">Password</label>
            <input type="password" id="newPassword" class="form-control" placeholder="Create a strong password">
          </div>
          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password">
          </div>
          <div class="checkbox-group mb-lg mt-md">
            <input type="checkbox" id="terms">
            <label for="terms" class="text-muted font-size-sm">I agree to the <a href="#" class="text-primary font-weight-600">Terms and Conditions</a> and Privacy Policy.</label>
          </div>
          <button type="button" class="btn btn-primary btn-block mb-lg">Sign Up</button>
          <p class="text-center text-muted">
            Already have an account? <a href="login.html" class="text-primary" style="font-weight: 600;">Log in</a>
          </p>
        </form>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/passcode.js"></script>
  <script src="js/rooms.js"></script>
  <script src="js/bookings.js"></script>
  <script src="js/payment.js"></script>
  <script src="js/services.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
