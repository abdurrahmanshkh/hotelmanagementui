<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Rooms - StayEase Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container navbar">
      <a href="index.html" class="brand-logo"><span>Stay</span>Ease Pro</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="rooms.html" class="active">Rooms</a>
        <a href="dashboard.html">Dashboard</a>
      </nav>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-ghost">Login</a>
        <button class="hamburger">☰</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="d-flex justify-content-between align-items-center mt-xl mb-md flex-wrap gap-md">
      <div>
        <h2>Available Rooms</h2>
        <p class="text-muted">Browse and filter rooms to find your perfect stay.</p>
      </div>
      <div class="d-flex gap-sm align-items-center">
        <label class="text-muted font-weight-500">Sort by:</label>
        <select class="form-control" id="roomSort" style="width: auto;">
          <option value="recommended">Recommended</option>
          <option value="priceLow">Price: Low to High</option>
          <option value="priceHigh">Price: High to Low</option>
          <option value="rating">Highest Rated</option>
        </select>
      </div>
    </div>

    <div class="rooms-layout">

      <!-- Filter Sidebar -->
      <aside class="filter-sidebar">
        <div class="card p-md">
          <div class="d-flex justify-content-between align-items-center mb-md border-bottom pb-sm">
            <h4>Filters</h4>
            <button class="text-primary font-size-sm font-weight-600 border-0 bg-transparent" style="cursor:pointer;" id="resetFilters">Reset</button>
          </div>
          <div class="filter-section">
            <h5 class="mb-sm">Room Type</h5>
            <div class="checkbox-group"><input type="checkbox" id="t1" data-filter-type="Standard"><label for="t1">Standard</label></div>
            <div class="checkbox-group"><input type="checkbox" id="t2" data-filter-type="Deluxe"><label for="t2">Deluxe</label></div>
            <div class="checkbox-group"><input type="checkbox" id="t3" data-filter-type="Suite"><label for="t3">Suite</label></div>
            <div class="checkbox-group"><input type="checkbox" id="t4" data-filter-type="Family"><label for="t4">Family</label></div>
          </div>
          <div class="filter-section">
            <h5 class="mb-sm">Max Price (₹)</h5>
            <input type="range" class="w-100 mb-sm" id="priceRange" min="1000" max="10000" value="10000" oninput="document.getElementById('priceVal').textContent='₹'+this.value">
            <div class="d-flex justify-content-between text-muted font-size-sm">
              <span>₹1,000</span><span id="priceVal">₹10,000</span>
            </div>
          </div>
          <div class="filter-section">
            <h5 class="mb-sm">Search</h5>
            <input type="text" class="form-control" id="roomSearch" placeholder="Search by room # or type…">
          </div>
          <button class="btn btn-primary btn-block mt-sm" id="applyFilters">Apply Filters</button>
        </div>
      </aside>

      <!-- Room Grid -->
      <main>
        <div id="roomGrid" class="room-grid">
          <!-- JS renders room cards here -->
        </div>
      </main>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container"><div class="footer-bottom"><p>&copy; 2026 StayEase Pro Customer Portal. All rights reserved.</p></div></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/passcode.js"></script>
  <script src="js/rooms.js"></script>
  <script src="js/bookings.js"></script>
  <script src="js/payment.js"></script>
  <script src="js/services.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
