<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings - StayEase Pro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container navbar">
      <a href="index.html" class="brand-logo"><span>Stay</span>Ease Pro</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="rooms.html">Rooms</a>
        <a href="my-bookings.html" class="active">My Bookings</a>
        <a href="dashboard.html">Dashboard</a>
      </nav>
      <div class="nav-actions">
        <button class="hamburger"><span class="material-symbols-outlined">menu</span></button>
      </div>
    </div>
  </header>

  <div class="container mt-xl mb-xl" style="min-height: 70vh;">
    <div style="margin-bottom: var(--space-xl);">
      <h1 class="mb-sm d-flex align-items-center gap-md"><span class="material-symbols-outlined text-primary" style="font-size:2.5rem;">receipt_long</span> My Bookings</h1>
      <p class="text-muted">Track all your current and past stays at StayEase Pro</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-booking-tab="active">Active</div>
      <div class="tab" data-booking-tab="upcoming">Upcoming</div>
      <div class="tab" data-booking-tab="completed">Completed</div>
      <div class="tab" data-booking-tab="cancelled">Cancelled</div>
    </div>

    <!-- Bookings List -->
    <div id="bookingsContainer" class="mt-lg d-flex flex-column gap-md"></div>
  </div>

  <footer class="site-footer">
    <div class="container"><div class="footer-bottom"><p>&copy; 2026 StayEase Pro Customer Portal. All rights reserved.</p></div></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/passcode.js"></script>
  <script src="js/rooms.js"></script>
  <script src="js/bookings.js"></script>
  <script src="js/payment.js"></script>
  <script src="js/services.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
