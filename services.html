<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Requests - StayEase Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container navbar">
      <a href="index.html" class="brand-logo"><span>Stay</span>Ease Pro</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
      </nav>
      <div class="nav-actions"><button class="hamburger">☰</button></div>
    </div>
  </header>

  <div class="container mt-xl">
    <h2 class="mb-md">Service Requests</h2>

    <div class="room-details-layout">
      <!-- Request Form -->
      <main>
        <div class="card mb-xl">
          <h3 class="mb-lg border-bottom pb-sm">Request Service</h3>
          <form id="serviceRequestForm">
            <div class="d-flex flex-wrap gap-md">
              <div class="form-group" style="flex: 1; min-width: 200px;">
                <label class="form-label">Room Number</label>
                <input type="text" class="form-control" id="srRoom" disabled>
              </div>
              <div class="form-group" style="flex: 2; min-width: 200px;">
                <label class="form-label">Service Type</label>
                <select class="form-control" id="srType">
                  <option disabled selected>Select a service</option>
                  <option>Room Cleaning</option><option>Food Order</option><option>Laundry</option>
                  <option>Technical Issue</option><option>Extra Towels</option><option>Water Bottle</option>
                  <option>Wake-up Call</option><option>Medical Assistance</option><option>Other</option>
                </select>
              </div>
            </div>
            <div class="d-flex flex-wrap gap-md">
              <div class="form-group" style="flex: 1; min-width: 200px;">
                <label class="form-label">Priority</label>
                <select class="form-control" id="srPriority">
                  <option>Low</option><option selected>Medium</option><option>High</option><option>Emergency</option>
                </select>
              </div>
              <div class="form-group" style="flex: 1; min-width: 200px;">
                <label class="form-label">Preferred Time</label>
                <input type="time" class="form-control" id="srTime">
              </div>
            </div>
            <div class="form-group mb-lg">
              <label class="form-label">Description (Optional)</label>
              <textarea class="form-control" id="srDescription" placeholder="Any specific details?"></textarea>
            </div>
            <button type="button" class="btn btn-primary">Submit Request</button>
          </form>
        </div>
      </main>

      <!-- Request History -->
      <aside>
        <div class="card p-0 h-100">
          <h3 class="p-lg border-bottom pb-md mb-0">My Requests</h3>
          <div class="p-md" id="srHistory" style="max-height: 500px; overflow-y: auto;">
            <p class="text-muted" style="font-size:0.85rem;">Loading...</p>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container"><div class="footer-bottom"><p>&copy; 2026 StayEase Pro Customer Portal. All rights reserved.</p></div></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/passcode.js"></script>
  <script src="js/rooms.js"></script>
  <script src="js/bookings.js"></script>
  <script src="js/payment.js"></script>
  <script src="js/services.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
