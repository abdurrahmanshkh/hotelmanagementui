<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StayEase Pro Admin - Login</title>
  <link rel="stylesheet" href="../css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .admin-login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--admin-primary);
      padding: var(--admin-space-lg);
    }
    .admin-login-card {
      background-color: var(--admin-surface);
      border-radius: var(--admin-radius-xl);
      box-shadow: var(--admin-shadow-lg);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }
    .admin-login-header {
      padding: var(--admin-space-xl);
      text-align: center;
      background-color: var(--admin-surface-alt);
      border-bottom: 1px solid var(--admin-surface-border);
    }
    .admin-login-body {
      padding: var(--admin-space-xl);
    }
    .demo-credentials {
      margin-top: var(--admin-space-lg);
      padding: var(--admin-space-md);
      background-color: var(--admin-info-bg);
      border-radius: var(--admin-radius-md);
      font-size: 0.875rem;
      color: var(--admin-info);
      border: 1px dashed var(--admin-info);
    }
  </style>
</head>
<body class="admin-body">

  <div class="admin-login-wrapper w-100">
    <div class="admin-login-card">
      <div class="admin-login-header" style="background: linear-gradient(135deg, var(--admin-primary), var(--admin-primary-hover)); color: white;">
        <div class="brand-icon" style="margin: 0 auto 16px auto; width: 56px; height: 56px; background: var(--admin-secondary); color: white; border-radius: var(--admin-radius-md); display:flex; align-items:center; justify-content:center; box-shadow: 0 8px 24px rgba(212, 165, 116, 0.3);">
          <span class="material-symbols-outlined" style="font-size:32px;">domain</span>
        </div>
        <h2 style="margin:0; font-size:1.75rem; color:white; font-weight: 700;">StayEase Pro</h2>
        <p style="margin:8px 0 0 0; color:rgba(255,255,255,0.8); font-size:0.95rem;">Admin Console</p>
      </div>
      
      <div class="admin-login-body">
        <form id="adminLoginForm">
          <!-- Validation Placeholder Error -->
          <div class="error-message mb-md" style="display:none; padding:12px; background:var(--admin-danger-bg); border-radius:var(--admin-radius-md);">
            Invalid email or password.
          </div>

          <div class="admin-form-group">
            <label class="admin-form-label">Email Address</label>
            <input type="email" id="email" class="admin-form-control" placeholder="admin@example.com" required>
          </div>
          
          <div class="admin-form-group">
            <label class="admin-form-label">Password</label>
            <input type="password" id="password" class="admin-form-control" placeholder="••••••••" required>
          </div>
          
          <div class="admin-form-group">
            <label class="admin-form-label">Staff Code (Optional)</label>
            <input type="text" id="staffCode" class="admin-form-control" placeholder="e.g. STF-123">
          </div>

          <div class="d-flex justify-between align-center mb-lg mt-md flex-wrap gap-sm">
            <label style="font-size:0.875rem; display:flex; align-items:center; gap:8px; cursor:pointer;">
              <input type="checkbox" style="accent-color:var(--admin-primary);"> Remember me
            </label>
          </div>

          <button type="submit" class="admin-btn admin-btn-primary w-100" style="padding: 12px; font-weight: 600;">Sign In to Dashboard</button>
        </form>

        <div class="demo-credentials" style="background: linear-gradient(135deg, rgba(212,165,116,0.1), rgba(61,106,139,0.05)); border: 1px solid var(--admin-secondary-light); color: var(--admin-text-main);">
          <strong style="color: var(--admin-primary);">Demo Admin Credentials:</strong><br>
          <span style="font-family: monospace; font-size: 0.85rem;">Email: admin@example.com</span><br>
          <span style="font-family: monospace; font-size: 0.85rem;">Password: Admin@123</span>
        </div>

        <div class="text-center mt-xl">
          <a href="../index.html" style="font-size:0.875rem; color:var(--admin-text-muted); text-decoration:none; display:inline-flex; align-items:center; gap:4px;">
            <span class="material-symbols-outlined" style="font-size:16px;">arrow_back</span> Back to Customer Portal
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/admin/admin-data.js"></script>
  <script src="../js/admin/admin-auth.js"></script>
  <script src="../js/admin/admin-validation.js"></script>
  <script src="../js/admin/admin-ui.js"></script>
  <script src="../js/admin/admin-dashboard.js"></script>
  <script src="../js/admin/admin-rooms.js"></script>
  <script src="../js/admin/admin-bookings.js"></script>
  <script src="../js/admin/admin-guests.js"></script>
  <script src="../js/admin/admin-service-requests.js"></script>
  <script src="../js/admin/admin-chats.js"></script>
  <script src="../js/admin/admin-pricing.js"></script>
  <script src="../js/admin/admin-housekeeping.js"></script>
  <script src="../js/admin/admin-payments.js"></script>
  <script src="../js/admin/admin-reports.js"></script>
  <script src="../js/admin/admin-settings.js"></script>
  <script src="../js/admin/admin-app.js"></script>
</body>
</html>
