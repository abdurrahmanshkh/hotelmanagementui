<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with Front Desk - StayEase Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="overflow: hidden;">

  <!-- Header -->
  <header class="site-header">
    <div class="container navbar">
      <a href="index.html" class="brand-logo"><span>Stay</span>Ease Pro</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
      </nav>
      <div class="nav-actions">
        <a href="dashboard.html" class="btn btn-ghost" style="padding: 4px 8px;">✕ Close Chat</a>
        <button class="hamburger">☰</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="chat-layout">

      <!-- Chat Interface -->
      <main class="card chat-card">
        <div class="chat-header d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center gap-sm">
            <div style="width: 40px; height: 40px; border-radius: 50%; background-color: var(--primary); display: flex; align-items: center; justify-content: center; color: white;">FD</div>
            <div>
              <h4 class="mb-0">Front Desk</h4>
              <p class="text-muted font-size-sm d-flex align-items-center gap-xs">
                <span style="width: 8px; height: 8px; border-radius: 50%; background-color: var(--success); display: inline-block;"></span>
                Online - Usually replies in 2 mins
              </p>
            </div>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages">
          <!-- JS renders messages here -->
        </div>

        <div class="chat-suggestions">
          <span class="chat-suggestion-chip">Need room cleaning</span>
          <span class="chat-suggestion-chip">Wi-Fi issue</span>
          <span class="chat-suggestion-chip">Food order help</span>
          <span class="chat-suggestion-chip">Late check-out request</span>
        </div>

        <div class="chat-input" id="chatInputArea">
          <input type="text" class="form-control flex-grow-1" id="chatInput" placeholder="Type a message..." style="border: none; background-color: var(--background);" maxlength="500">
          <button class="btn btn-primary btn-icon" id="chatSendBtn" style="border-radius: var(--radius-md);">➤</button>
        </div>
      </main>

      <!-- Booking Context Panel -->
      <aside class="chat-context">
        <div class="card h-100">
          <h4 class="mb-md border-bottom pb-sm">Current Stay</h4>
          <h3 class="mb-xs" id="chatRoomInfo">—</h3>
          <p class="text-muted font-size-sm mb-md" id="chatGuestName">—</p>
          <div class="info-item mb-md"><span class="info-label">Booking ID</span><span class="info-value font-size-sm" id="chatBookingId">—</span></div>
          <div class="info-item mb-lg"><span class="info-label">Dates</span><span class="info-value font-size-sm" id="chatBookingDates">—</span></div>
          <a href="my-bookings.html" class="btn btn-secondary btn-block">View Full Details</a>
        </div>
      </aside>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/passcode.js"></script>
  <script src="js/rooms.js"></script>
  <script src="js/bookings.js"></script>
  <script src="js/payment.js"></script>
  <script src="js/services.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
