<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StayEase Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-visual">
      <h2>Welcome Back to StayEase</h2>
      <p class="mt-md">Access your digital room passcode, manage bookings, and chat with the front desk instantly.</p>
    </div>
    <div class="auth-form-container">
      <div class="card auth-form-card">
        <a href="index.html" class="brand-logo mb-xl justify-content-center"><span>Stay</span>Ease Pro</a>
        <h3 class="mb-sm text-center">Customer Login</h3>
        <p class="text-muted text-center mb-xl">Please sign in to your account.</p>
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="guest@example.com">
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div style="position: relative;">
              <input type="password" id="password" class="form-control w-100" placeholder="••••••••">
            </div>
          </div>
          <div class="checkbox-group justify-content-between mb-lg">
            <label class="d-flex align-items-center gap-sm">
              <input type="checkbox"> <span class="text-muted font-size-sm">Remember me</span>
            </label>
          </div>
          <button type="button" class="btn btn-primary btn-block mb-lg">Login</button>
          <p class="text-center text-muted">
            Don't have an account? <a href="signup.html" class="text-primary" style="font-weight: 600;">Sign up</a>
          </p>
        </form>
        <div class="mt-xl p-md" style="background-color: var(--info-bg); border-radius: var(--radius-md); border-left: 4px solid var(--info);">
          <p style="font-size: 0.875rem; color: var(--info); font-weight: 600;" class="mb-xs">Demo Credentials</p>
          <p style="font-size: 0.8rem; color: var(--text-main);">Email: guest@example.com <br> Pass: Guest@123</p>
        </div>
      </div>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/passcode.js"></script>
  <script src="js/rooms.js"></script>
  <script src="js/bookings.js"></script>
  <script src="js/payment.js"></script>
  <script src="js/services.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
