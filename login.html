<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StayEase Pro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container navbar">
      <a href="index.html" class="brand-logo"><span>Stay</span>Ease Pro</a>
      <div class="nav-actions">
        <a href="signup.html" class="btn btn-ghost">Create Account</a>
      </div>
    </div>
  </header>

  <div class="split-layout">
    <!-- Image Side -->
    <div class="split-image" style="background-image: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1000&auto=format&fit=crop');">
      <div class="hero-overlay"></div>
      <div class="hero-content text-left" style="position:absolute; bottom: 10%; padding: var(--space-xl);">
        <h2 class="text-inverse mb-sm">Welcome Back</h2>
        <p class="text-inverse" style="opacity: 0.8; max-width: 400px;">Access your digital keys, manage upcoming stays, and instantly chat with our concierge.</p>
      </div>
    </div>
    
    <!-- Form Side -->
    <div class="split-content">
      <div class="auth-form-container">
        <div style="margin-bottom: var(--space-xl);">
          <h2 class="mb-sm text-center">Welcome Back</h2>
          <p class="text-muted text-center" style="font-size: 0.95rem;">Access your bookings and exclusive benefits</p>
        </div>
        
        <div style="background: var(--primary-light); padding: var(--space-md); border-radius: var(--radius-md); margin-bottom: var(--space-xl); text-align: center;">
          <p class="text-muted font-size-sm mb-xs">Demo Credentials</p>
          <p style="font-family: monospace; color: var(--primary); font-weight: 600; font-size: 0.9rem; margin-bottom: 0.5rem;">guest@example.com</p>
          <p style="font-family: monospace; color: var(--primary); font-weight: 600; font-size: 0.9rem; margin-bottom: 0;">Guest@123</p>
        </div>
        
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="email" style="font-weight: 600;">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
          </div>
          <div class="form-group mb-xl">
            <label class="form-label" for="password" style="font-weight: 600;">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
          
          <button type="button" class="btn btn-primary btn-block" style="padding: 1rem; font-weight: 600;">Sign In</button>
          
          <div class="text-center mt-lg">
            <p class="text-muted font-size-sm">New here? <a href="signup.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create an account</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
