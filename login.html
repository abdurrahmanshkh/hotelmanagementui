<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StayEase Pro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container navbar">
      <a href="index.html" class="brand-logo"><span>Stay</span>Ease Pro</a>
      <div class="nav-actions">
        <a href="signup.html" class="btn btn-ghost">Create Account</a>
      </div>
    </div>
  </header>

  <div class="split-layout">
    <!-- Image Side -->
    <div class="split-image" style="background-image: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1000&auto=format&fit=crop');">
      <div class="hero-overlay"></div>
      <div class="hero-content text-left" style="position:absolute; bottom: 10%; padding: var(--space-xl);">
        <h2 class="text-inverse mb-sm">Welcome Back</h2>
        <p class="text-inverse" style="opacity: 0.8; max-width: 400px;">Access your digital keys, manage upcoming stays, and instantly chat with our concierge.</p>
      </div>
    </div>
    
    <!-- Form Side -->
    <div class="split-content">
      <div class="auth-form-container">
        <h2 class="mb-sm text-center">Sign In</h2>
        <p class="text-muted text-center mb-xl">Use <code style="color:var(--primary); font-size:0.85rem; padding:2px 4px; background:var(--primary-light); border-radius:4px;">guest@example.com</code> / <code>Guest@123</code></p>
        
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="name@example.com" required>
            <small class="text-error" id="loginEmailErr" style="display:none;"></small>
          </div>
          <div class="form-group mb-xl">
            <label class="form-label" for="loginPass">Password</label>
            <input type="password" id="loginPass" class="form-control" placeholder="••••••••" required>
            <small class="text-error" id="loginPassErr" style="display:none;"></small>
          </div>
          
          <button type="submit" class="btn btn-primary btn-block">Sign In</button>
          
          <div class="text-center mt-lg">
            <p class="text-muted font-size-sm">Don't have an account? <a href="signup.html" class="font-weight-600">Sign Up</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
